<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💧</text></svg>">
    <title>MindU | บันทึกใจให้น่าจดจำ</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <section id="role-screen" class="screen active">
            <div class="glass-card">
                <div class="brand">
                    <span class="main-emoji">💧</span>
                    <h1>MindU</h1>
                    <p>เพราะทุกความรู้สึก... มีความหมาย</p>
                </div>
                <div class="action-area">
                    <button class="btn btn-student" onclick="showScreen('student-screen')">นักศึกษา</button>
                    <button class="btn btn-outline" onclick="showScreen('login-screen')">อาจารย์ / บุคลากร</button>
                </div>
            </div>
        </section>

        <section id="login-screen" class="screen">
            <div class="glass-card">
                <h2>ยืนยันตัวตน 🔐</h2>
                <div class="input-group">
                    <label>รหัสผ่านเข้าใช้งาน</label>
                    <input type="password" id="staff-password" placeholder="ระบุรหัสผ่าน (20043)">
                </div>
                <button class="btn btn-accent" onclick="handleLogin()">เข้าสู่ระบบ</button>
                <button class="btn-text" onclick="showScreen('role-screen')">ย้อนกลับ</button>
            </div>
        </section>

        <section id="student-screen" class="screen">
            <div class="glass-card">
                <nav class="nav-mini">
                    <button onclick="showScreen('role-screen')">← ออก</button>
                    <span class="major-badge" id="display-major">รอกดเลือกสาขา</span>
                </nav>

                <div class="step-box">
                    <h3>1. ข้อมูลเบื้องต้น</h3>
                    <select id="student-major" onchange="updateMajorBadge()">
                        <option value="" disabled selected>เลือกสาขาวิชา</option>
                        <option value="คอมพิวเตอร์ศึกษา">คอมพิวเตอร์ศึกษา</option>
                        <option value="วิทยาการคอมพิวเตอร์">วิทยาการคอมพิวเตอร์</option>
                        <option value="เทคโนโลยีสารสนเทศ">เทคโนโลยีสารสนเทศ</option>
                    </select>
                </div>

                <div class="step-box">
                    <h3>2. วันนี้ใจเป็นยังไงบ้าง?</h3>
                    <div class="mood-selector" id="mood-options">
                        </div>
                </div>

                <div class="step-box">
                    <h3>3. ระดับความรู้สึก (1-5)</h3>
                    <div class="level-selector">
                        <input type="range" id="mood-level" min="1" max="5" value="3">
                        <div class="level-labels">
                            <span>เบาๆ</span>
                            <span>ปานกลาง</span>
                            <span>หนักมาก</span>
                        </div>
                    </div>
                </div>

                <textarea id="student-note" placeholder="อยากระบายอะไรไหม... (อาจารย์จะไม่เห็นส่วนนี้)"></textarea>
                
                <button class="btn btn-primary" onclick="submitEntry()">บันทึกใจไว้ 💌</button>

                <div class="history-section">
                    <h4>ประวัติล่าสุดของคุณ</h4>
                    <div id="history-list"></div>
                </div>
            </div>
        </section>

        <section id="staff-screen" class="screen">
            <div class="glass-card wide-card">
                <header class="dash-header">
                    <h2>ภาพรวมสุขภาพใจ</h2>
                    <select id="filter-major" onchange="refreshDashboard()">
                        <option value="all">ทุกสาขา</option>
                        <option value="คอมพิวเตอร์ศึกษา">คอมพิวเตอร์ศึกษา</option>
                        <option value="วิทยาการคอมพิวเตอร์">วิทยาการคอมพิวเตอร์</option>
                    </select>
                </header>

                <div class="stats-grid">
                    <div class="chart-box">
                        <canvas id="mainChart"></canvas>
                    </div>
                    <div class="summary-card">
                        <p>อารมณ์ที่พบบ่อย</p>
                        <h2 id="top-mood">-</h2>
                        <hr>
                        <p>ระดับเฉลี่ย</p>
                        <h2 id="avg-level">0.0</h2>
                    </div>
                </div>

                <button class="btn btn-outline" onclick="showScreen('role-screen')">ออกจากระบบ</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
